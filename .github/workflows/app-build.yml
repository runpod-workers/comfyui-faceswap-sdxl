name: Build App Image

# Builds the complete optimized image and pushes to Docker Hub.

on:
  push:
    paths:
      - 'Dockerfile'
      - 'download_models.py'
      - 'handler.py'
      - 'comfyui_character.py'
      - '.github/workflows/app-build.yml'

jobs:
  build-app:
    runs-on: DO
    steps:
      - name: Clean up Docker
        run: |
          docker stop $(docker ps -aq) 2>/dev/null || true
          docker rm -f $(docker ps -aq) 2>/dev/null || true
          docker volume rm -f $(docker volume ls -q) 2>/dev/null || true
          docker system prune -af --volumes
          docker builder prune -af
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: |
            runpod/comfyui-faceswap-sdxl:latest
            runpod/comfyui-faceswap-sdxl:v2
          platforms: linux/amd64
          cache-from: type=registry,ref=runpod/comfyui-faceswap-sdxl:buildcache
          cache-to: type=registry,ref=runpod/comfyui-faceswap-sdxl:buildcache,mode=max
