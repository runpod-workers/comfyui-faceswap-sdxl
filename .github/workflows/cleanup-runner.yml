name: Cleanup DO Runner

on:
  push:
    paths:
      - '.github/workflows/cleanup-runner.yml'

jobs:
  cleanup:
    runs-on: DO
    steps:
      - name: Disk usage before
        run: df -h /

      - name: Nuke old runner work dirs
        run: |
          cd /home/runner/actions-runner/_work
          for d in */; do
            [ "$d" = "comfyui-faceswap-sdxl/" ] && continue
            rm -rf "$d"
          done
          rm -rf /tmp/* 2>/dev/null || true

      - name: Clean Docker
        run: |
          docker system prune -af
          docker builder prune -af

      - name: Disk usage after
        run: df -h /
