name: Build and Push App Image

# Builds the app image (base + models + code). Fast since base is pre-built.
# Runs on push to main or manual trigger.

on:
  push:
    paths:
      - 'Dockerfile'
      - 'download_models.py'
      - 'handler.py'
      - 'comfyui_character.py'
      - '.github/workflows/docker-build.yml'
    branches: [main]
  workflow_dispatch:

jobs:
  build-app:
    runs-on: DO
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          tags: |
            runpod/comfyui-faceswap:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=runpod/comfyui-faceswap:buildcache
          cache-to: type=registry,ref=runpod/comfyui-faceswap:buildcache,mode=max
